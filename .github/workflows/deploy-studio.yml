name: Deploy Studio

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'packages/studio/**'
      - '.github/workflows/deploy-studio.yml'
  workflow_call:   # called by release.yml on every tag push
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: packages/studio
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: packages/studio
        run: bun run build
        env:
          VITE_CLI_BASE_URL: ${{ vars.VITE_CLI_BASE_URL || 'http://localhost:3388' }}

      - name: Deploy to Cloudflare Workers
        working-directory: packages/studio
        run: bunx wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
